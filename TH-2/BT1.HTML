<!DOCTYPE html>
<html lang="en">
<head>
        <link rel="stylesheet" href="style1.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>HTML Table</title>  
</head>

<body>
    <div class="form-container">
        <h2>Get in touch with us by filling contact form below</h2>

    <form>

      <div class="row">
        <input type="text" placeholder="* Enter your full name">
        <input type="email" placeholder="* Enter your email address">
      </div>

      <input type="text" class="full" placeholder="Enter your subject">

      <textarea class="full" placeholder="* Your message here..."></textarea>

      <div class="row space-between">
        <button type="submit">Send message</button>
        <span class="note">* Please fill all required form field, thanks!</span>
      </div>
    </form>
  </div>
</body>
